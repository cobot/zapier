name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run CI in dev container
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            set -euxo pipefail # Fail on error
            yarn install --frozen-lockfile
            yarn lint
            yarn build
            yarn test
            yarn validate
  automerge:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@v3.15.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          target: minor
